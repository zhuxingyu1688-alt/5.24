name: Android CI (Auto APK)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "family_app_v2/gradlew" ]; then
          chmod +x family_app_v2/gradlew
        elif [ -f "gradlew" ]; then
          chmod +x gradlew
        fi

    - name: Build with Gradle
      run: |
        if [ -d "family_app_v2" ]; then
          cd family_app_v2
        fi
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-family-app
        path: |
          family_app_v2/app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/debug/app-debug.apk
